  <style>
    :root {
      --bg-primary: #0a0f1c;
      --text-primary: #e8f0ff;
      --text-secondary: #d0e0ff;
      --text-dim: #a5b8d8;
      --accent: #80a0ff;
      --accent-hover: #a0c0ff;
      --glow: rgba(128, 160, 255, 0.26);
      --card-bg: rgba(255, 255, 255, 0.085);
      --card-border: rgba(200, 220, 255, 0.14);
    }

    [data-theme="light"] {
      --bg-primary: #f8f9ff;
      --text-primary: #0f172a;
      --text-secondary: #1e293b;
      --text-dim: #475569;
      --accent: #06b6d4;
      --accent-hover: #22d3ee;
      --glow: rgba(6, 182, 212, 0.22);
      --card-bg: rgba(255, 255, 255, 0.82);
      --card-border: rgba(6, 182, 212, 0.20);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.9;
      overflow-x: hidden;
    }

    header {
      padding: 2rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(200,220,255,0.1);
    }

    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .back-link:hover { color: var(--accent-hover); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 5% 6rem;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      letter-spacing: -2.5px;
      color: var(--text-secondary);
      text-shadow: 0 0 50px var(--glow);
      margin-bottom: 0rem;
    }

    .intro {
      font-size: 1rem;
      max-width: 760px;
      margin: 0 auto 3rem;
      color: var(--text-dim);
      line-height: 1.75;
      text-align: center;
    }

    .controls {
      margin: 2.5rem 0 3.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      align-items: center;
      justify-content: center;
    }

    .search-bar {
      flex: 1;
      min-width: 280px;
      max-width: 520px;
      padding: 15px 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      font-size: 1.08rem;
      color: var(--text-primary);
      backdrop-filter: blur(16px);
    }

        .filter-info {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      color: var(--text-dim);
      width: 100%;
      margin-top: 0rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2.2rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 2.2rem 2rem;
      backdrop-filter: blur(24px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 50px var(--glow);
      border-color: var(--accent);
    }

    .card-epoch { 
      font-size: 0.88rem; 
      color: var(--text-dim); 
      letter-spacing: 1px; 
      margin-bottom: 0.8rem; 
    }

    .card-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 1.55rem; 
      color: var(--text-secondary); 
      margin-bottom: 1.1rem; 
      line-height: 1.3; 
    }

    .card-body { 
      flex: 1; 
      font-size: 1.05rem; 
      color: var(--text-dim); 
      line-height: 1.75; 
      margin-bottom: 1.4rem; 
    }

    .emoji-cluster {
      font-size: 2.4rem;
      margin: 1rem 0;
      text-align: center;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: auto;
    }

    .card-tags span {
      font-size: 0.82rem;
      padding: 5px 14px;
      background: rgba(128,160,255,0.1);
      border-radius: 20px;
      color: var(--accent);
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-dim);
    }

    .no-results svg {
      width: 72px;
      height: 72px;
      opacity: 0.5;
      margin-bottom: 1.8rem;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,15,28,0.88);
      backdrop-filter: blur(20px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .modal.show {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      max-width: 760px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 3rem 2.8rem;
      position: relative;
      box-shadow: 0 30px 80px var(--glow);
      transform: scale(0.94);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal.show .modal-content {
      transform: scale(1);
    }

    .modal-close {
      position: absolute;
      top: 1.8rem;
      right: 1.8rem;
      background: none;
      border: none;
      font-size: 2.2rem;
      color: var(--text-dim);
      cursor: pointer;
      line-height: 1;
      transition: all 0.3s ease;
    }

    .modal-close:hover {
      color: #ff6b6b;
      transform: scale(1.1);
    }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text-secondary);
      margin-bottom: 1.8rem;
      text-align: center;
    }

    .back-section {
      text-align: center;
      margin-top: 4rem;
    }

    .back-btn {
      padding: 18px 58px;
      font-size: 1.32rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      box-shadow: 0 10px 35px var(--glow);
      transition: all 0.4s ease;
    }

    .back-btn:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 45px var(--glow);
    }

    .ripple-return {
      margin-top: 2.2rem;
      color: var(--text-dim);
      font-style: italic;
      opacity: 0.92;
      font-size: 1.05rem;

      display: inline-block;
      margin-top: 2rem;
      padding: 10px 32px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(200,220,255,0.18);
      border-radius: 50px;
      color: var(--accent);
      text-decoration: none;
      font-size: 1.02rem;
      backdrop-filter: blur(10px);
      transition: all 0.4s ease;
    }

    .pond-keeper-tag:hover {
      background: rgba(128, 160, 255, 0.12);
      border-color: var(--accent);
      color: var(--accent-hover);
      box-shadow: 0 0 20px var(--glow);
      transform: translateY(-2px);
    }

    /* Theme Toggle */
    .theme-btn {
      position: fixed;
      top: 1.8rem;
      right: 1.8rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 50%;
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;

    .theme-btn:hover {

      box-shadow: 0 0 36px var(--glow);
    }

    .theme-btn svg {
      width: 26px;
      height: 26px;
      stroke: var(--accent);
      stroke-width: 2.2;
      transition: all 0.3s ease;
    }

    .theme-btn:hover svg {

    }

    @media (max-width: 768px) {

      .grid { gap: 1.8rem; }
      .card { padding: 1.8rem 1.6rem; }
      .modal-content { padding: 2.4rem 2rem; }
    }
  </style>
</head>
